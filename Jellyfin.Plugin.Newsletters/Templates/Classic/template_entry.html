<tr class="boxed" style="outline: 1px solid #bf7df0;border-radius: 25px;">
    <td>
        <table style="margin:0;padding:0;border:0;">
            <tr style="margin:0;padding:0;border:0;">
                <td rowspan="0" class="lefttable"
                    style="padding-right: 20px; padding-left: 20px; padding-top: 20px; padding-bottom: 20px;">
                    <a href="{ItemURL}" target="_blank"><img style="width: 133px; height: 200px;" src="{ImageURL}"></a>
                </td>
                <td class="righttable" style="vertical-align: top; padding-right: 10px; padding-top: 10px;width:100%;">
                    <div id="SeriesTitle" class="text" style="color: #FFFFFF; text-align: center;">
                        <h2 style="margin-top:6px;margin-bottom:0px;">
                            <a href="{ItemURL}" target="_blank" style="color:#87beff;text-decoration: none;">
                                {Title}
                            </a>
                        </h2>
                    </div>

                    <div style="color: #d190c5; font-size: small; margin-bottom: 5px;">
                        <span id="runtime" style="display: inline-block; white-space: nowrap; margin-right: 4px;">
                            <b>Duration:</b> <i>{RunTime} min.</i> |
                        </span>
                        <span id="communityrating" style="display: inline-block; white-space: nowrap; margin-right: 4px;">
                            <img src="https://cdn-icons-png.flaticon.com/512/3418/3418886.png" style="height: 14px; vertical-align: text-bottom;"> {CommunityRating} |
                        </span>
                        <span id="officialrating" style="display: inline-block; white-space: nowrap; margin-right: 4px;">
                            {OfficialRating} |
                        </span>
                        <span id="premiereyear" style="display: inline-block; white-space: nowrap;">
                            {PremiereYear}
                        </span>
                    </div>

                    <!--  -->

                    <div class="text" style="color: #d190c5;">
                        {SeasonEpsInfo}
                    </div>
                    <hr style="border-color: #007fb1;margin-bottom:12px;width:80%;" />
                    <div id="Description" class="text" style="color: #FFFFFF;">
                        {SeriesOverview}
                    </div>
                </td>
            </tr>
        </table>
    </td>
</tr>
